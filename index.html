<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Browservania — a browser-based metroidvania built with Three.js." />
    <title>Browservania</title>
    <script type="module" crossorigin src="/browservania/assets/index-B3ymb5l8.js"></script>
    <link rel="stylesheet" crossorigin href="/browservania/assets/index-C0k7tUsF.css">
  </head>
  <body>
    <main id="game" aria-label="Browservania game canvas"></main>

    <button
      id="pause-cog"
      class="pause-cog"
      type="button"
      data-input-action="pause"
      aria-label="Open pause menu"
      title="Menu"
    >&#9881;</button>

    <section id="hud" class="hud" aria-live="polite">
      <div
        id="hud-health-slots"
        class="hud-health"
        aria-label="Player health"
      ></div>

      <div id="hud-abilities" class="hud-abilities" aria-label="Player abilities" hidden>
        <div id="hud-dash" class="hud-ability hud-ability--dash" title="Dash" hidden>
          <div id="hud-dash-fill" class="hud-ability__fill"></div>
          <span class="hud-ability__icon" aria-hidden="true">»</span>
          <span id="hud-dash-value" class="hud-ability__value"></span>
        </div>
        <div id="hud-slingtile" class="hud-ability hud-ability--slingtile hud-ability--numbered" title="Slingtile ammo" hidden>
          <div id="hud-slingtile-fill" class="hud-ability__fill"></div>
          <span class="hud-ability__icon" aria-hidden="true">◆</span>
          <span id="hud-slingtile-value" class="hud-ability__value">0</span>
        </div>
        <div id="hud-heal" class="hud-ability hud-ability--heal hud-ability--numbered" title="Healing charges" hidden>
          <div id="hud-heal-fill" class="hud-ability__fill"></div>
          <span class="hud-ability__icon" aria-hidden="true">+</span>
          <span id="hud-heal-value" class="hud-ability__value">0</span>
        </div>
        <div id="hud-heart-grenade" class="hud-ability hud-ability--grenade" title="Heart grenade" hidden>
          <div id="hud-heart-grenade-fill" class="hud-ability__fill"></div>
          <span class="hud-ability__icon" aria-hidden="true">●</span>
          <span id="hud-heart-grenade-value" class="hud-ability__value"></span>
        </div>
      </div>
    </section>

    <section id="boss-hud" class="boss-hud" aria-live="polite" hidden>
      <div class="boss-hud__header">
        <strong id="boss-name" class="boss-hud__name">Boss</strong>
        <span id="boss-status" class="boss-hud__status" hidden></span>
        <span id="boss-phase" class="boss-hud__phase">Phase 1 / 1</span>
      </div>
      <div class="boss-hud__track" aria-label="Boss health">
        <div id="boss-health-fill" class="boss-hud__fill"></div>
        <span id="boss-health-text" class="boss-hud__health-text">1 / 1</span>
      </div>
    </section>

    <div
      id="prompt"
      class="prompt"
      data-input-action="interact"
      role="button"
      aria-label="Interact"
      hidden
    ></div>
    <div id="toast" class="toast" hidden></div>


    <div id="pause-menu" class="pause-menu" hidden>
      <section class="pause-menu__panel" role="dialog" aria-modal="true" aria-labelledby="pause-title">
        <h2 id="pause-title">Paused</h2>

        <div id="pause-main-view">
          <div class="pause-menu__actions">
            <button id="pause-continue" type="button">Continue</button>
            <button id="pause-restart" type="button">Restart</button>
            <button id="pause-settings" type="button">Settings</button>
            <button id="pause-export-save" type="button">Export save file</button>
            <button id="pause-import-save" type="button">Load save file</button>
            <input
              id="pause-import-file"
              type="file"
              accept="application/json,.json"
              hidden
            />
          </div>
        </div>

        <div id="pause-settings-view" class="pause-menu__settings" hidden>
          <label class="pause-menu__toggle" for="pause-touch-controls">
            <input id="pause-touch-controls" type="checkbox" />
            <span>
              <strong>On-screen controls</strong>
              <small>Use gesture movement and the mobile action buttons.</small>
            </span>
          </label>

          <div id="pause-touch-sensitivity-setting" class="pause-menu__setting">
            <label for="pause-touch-sensitivity">
              <span>
                <strong>Directional Touch Input Sensitivity</strong>
                <small>Higher sensitivity reacts to a shorter finger movement.</small>
              </span>
              <output id="pause-touch-sensitivity-value" for="pause-touch-sensitivity">7 / 10</output>
            </label>
            <input
              id="pause-touch-sensitivity"
              type="range"
              min="1"
              max="10"
              step="1"
              value="7"
            />
            <div class="pause-menu__range-labels" aria-hidden="true">
              <span>Steady</span>
              <span>Responsive</span>
            </div>
          </div>

          <div class="pause-menu__subactions">
            <button id="pause-show-keybindings" type="button">Show Keybindings</button>
            <button id="pause-settings-back" class="pause-menu__back" type="button">Back</button>
          </div>
        </div>

        <div id="pause-keybindings-view" class="pause-menu__keybindings-view" hidden>
          <p id="pause-keybindings-mode" class="pause-menu__keybindings-mode"></p>
          <div id="pause-keybindings-list" class="pause-menu__keybindings"></div>
          <button id="pause-keybindings-back" class="pause-menu__back" type="button">Back to Settings</button>
        </div>

        <p id="pause-status" class="pause-menu__status" aria-live="polite"></p>
      </section>

      <div id="pause-version" class="pause-menu__version" aria-label="Game version"></div>
    </div>

    <div id="important-message" class="important-message" hidden>
      <section
        id="important-message-panel"
        class="important-message__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="important-message-text"
      >
        <p id="important-message-text" class="important-message__text"></p>
        <div
          id="important-message-progress"
          class="important-message__progress"
          role="button"
          tabindex="0"
          aria-label="Continue"
        >E to continue</div>
      </section>
    </div>

    <div id="dialogue" class="dialogue" hidden>
      <section id="dialogue-panel" class="dialogue__panel" role="dialog" aria-modal="true" aria-labelledby="dialogue-speaker">
        <div id="dialogue-speaker" class="dialogue__speaker">Speaker</div>
        <p id="dialogue-text" class="dialogue__text"></p>
        <div id="dialogue-choices" class="dialogue__choices" hidden></div>
        <div
          id="dialogue-progress"
          class="dialogue__progress"
          role="button"
          tabindex="0"
          aria-label="Continue dialogue"
        >E to continue</div>
      </section>
    </div>

    <div id="godmode" class="godmode" hidden>
      <section class="godmode__panel" role="dialog" aria-modal="true" aria-labelledby="godmode-title">
        <h2 id="godmode-title">God Mode</h2>
        <p>Enter any checkpoint ID to activate it and teleport there immediately.</p>
        <form id="godmode-form">
          <label for="godmode-checkpoint">Checkpoint ID</label>
          <input
            id="godmode-checkpoint"
            name="checkpoint"
            list="godmode-checkpoints"
            autocomplete="off"
            spellcheck="false"
          />
          <datalist id="godmode-checkpoints"></datalist>
          <label class="godmode__toggle" for="godmode-invincible">
            <input id="godmode-invincible" type="checkbox" />
            <span>Invicible</span>
          </label>
          <label class="godmode__toggle" for="godmode-fly">
            <input id="godmode-fly" type="checkbox" />
            <span>Fly <small>Space up · Left Shift down</small></span>
          </label>
          <div class="godmode__actions">
            <button type="submit">Teleport</button>
            <button id="godmode-close" type="button" class="godmode__secondary">Close</button>
          </div>
          <p id="godmode-error" class="godmode__error" aria-live="polite"></p>
        </form>
        <small>Press Escape to close.</small>
      </section>
    </div>

    <div id="touch-controls" class="touch-controls" aria-label="On-screen controls" hidden>
      <div
        id="touch-gesture-zone"
        class="touch-gesture-zone"
        aria-label="Movement gesture area"
      ></div>
      <div id="touch-gesture-indicator" class="touch-gesture-indicator" aria-hidden="true">
        <span class="touch-gesture-indicator__arrow touch-gesture-indicator__arrow--up">▲</span>
        <span class="touch-gesture-indicator__arrow touch-gesture-indicator__arrow--left">◀</span>
        <span class="touch-gesture-indicator__arrow touch-gesture-indicator__arrow--right">▶</span>
        <span class="touch-gesture-indicator__arrow touch-gesture-indicator__arrow--down">▼</span>
      </div>

      <div class="touch-actions" aria-label="Action controls">
        <button class="touch-button touch-action touch-action--l" type="button" aria-label="L, unassigned" disabled>L</button>
        <button class="touch-button touch-action touch-action--r" type="button" aria-label="R, unassigned" disabled>R</button>
        <button class="touch-button touch-action touch-action--y" type="button" aria-label="Y, unassigned" disabled>Y</button>
        <button class="touch-button touch-action touch-action--x" type="button" data-input-action="attack" aria-label="X, attack">X</button>
        <button class="touch-button touch-action touch-action--b" type="button" data-input-action="dash" aria-label="B, dash">B</button>
        <button class="touch-button touch-action touch-action--a" type="button" data-input-action="jump" aria-label="A, jump or confirm">A</button>
      </div>
    </div>

    <div id="debug-panel" class="debug-panel" hidden></div>
  </body>
</html>
